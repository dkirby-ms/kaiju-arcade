<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kaiju Arcade Commander Console</title>
    <link rel="stylesheet" href="/commander/styles.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/colyseus.js@0.17.0/dist/colyseus.js"></script>
  </head>
  <body>
    <main class="hud-shell">
      <!-- HEADER: Top-left position -->
      <header class="panel hud-header">
        <h1>COMMANDER CONSOLE</h1>
        <p class="subline">TACTICAL COMMAND SURFACE</p>
      </header>

      <!-- SESSION PANEL: Top-left below header -->
      <section class="panel session-panel">
        <h2>SESSION</h2>
        <label for="playerName">Operator</label>
        <input id="playerName" type="text" maxlength="24" value="Commander" />
        <p class="session-guidance">Active match sessions reconnect automatically in this browser.</p>

        <div id="lobbyPhasePanel">
          <p id="lobbyPhaseStatus" class="status">Awaiting lobby phase...</p>
          <button id="startMatchButton" class="primary" type="button">Start Match</button>
          <ul id="lobbyRoster"></ul>
        </div>

        <p id="connectionState" class="status">OFFLINE</p>
      </section>

      <!-- TACTICAL HUD: Top-center bar with status and feed combined -->
      <section class="panel tactical-hud" data-active-ui="true">
        <div class="hud-content">
          <div class="hud-status-group">
            <div class="hud-stat">
              <span class="hud-label">BASE HP</span>
              <strong id="cityBaseHp">-</strong>
            </div>
            <div class="hud-stat">
              <span class="hud-label">SCORE</span>
              <strong id="commanderScore">-</strong>
            </div>
            <div class="hud-stat">
              <span class="hud-label">BARRIERS</span>
              <strong id="activeBarriers">-</strong>
            </div>
            <div class="hud-stat">
              <span class="hud-label">TARGET</span>
              <strong id="selectedTarget">-</strong>
            </div>
            <div class="hud-divider"></div>
            <div class="hud-feed-inline" id="tacticFeedInline"></div>
          </div>
        </div>
      </section>

      <!-- MAP PANEL: Full viewport coverage -->
      <section class="panel map-panel" data-active-ui="true">
        <div id="leafletMap"></div>
        <canvas id="radarOverlay"></canvas>
      </section>

      <!-- DISPATCH PANEL: Bottom-left overlay with action buttons -->
      <section class="panel dispatch-panel" data-active-ui="true">
        <h2>DISPATCH</h2>
        <div class="dispatch-target-row">
          <label for="targetId">TARGET</label>
          <select id="targetId"></select>
        </div>
        <div class="dispatch-buttons">
          <button class="dispatch-btn" data-asset="Scramble Jets" title="Rapid aerial response">
            <span class="btn-icon">✈</span>
            <span class="btn-label">SCRAMBLE</span>
          </button>
          <button class="dispatch-btn" data-asset="Deploy Mechs" title="Mechanized infantry">
            <span class="btn-icon">⚙</span>
            <span class="btn-label">MECHS</span>
          </button>
          <button class="dispatch-btn" data-asset="Raise Barrier" title="Defensive containment">
            <span class="btn-icon">🛡</span>
            <span class="btn-label">BARRIER</span>
          </button>
          <button class="dispatch-btn" data-asset="Evac Sector" title="Civilian protection">
            <span class="btn-icon">⚠</span>
            <span class="btn-label">EVAC</span>
          </button>
        </div>
        <div class="dispatch-readiness">
          <ul id="assetStatus"></ul>
        </div>
      </section>

      <!-- RESULTS PANEL: Bottom-left below dispatch, compact results log -->
      <section class="panel results-panel" data-active-ui="true">
        <h2>RESULTS</h2>
        <ul id="dispatchResults"></ul>
      </section>

      <!-- SIGNAL FEED: Bottom-right, tall scrollable feed -->
      <section class="panel signal-feed-panel" data-active-ui="true">
        <h2>SIGNAL FEED</h2>
        <ul id="signalFeed"></ul>
      </section>

      <!-- ALERT MODE TOGGLE: Top-right corner -->
      <div class="alert-mode-badge" data-active-ui="true">
        <button id="alertModeToggle" type="button" title="Toggle alert mode">⚡</button>
        <strong id="alertModeState">NOMINAL</strong>
      </div>
    </main>

    <script src="/common/session-manager.js"></script>
    <script src="/common/colyseus-client.js"></script>
    <script src="/commander/app.js"></script>
  </body>
</html>
