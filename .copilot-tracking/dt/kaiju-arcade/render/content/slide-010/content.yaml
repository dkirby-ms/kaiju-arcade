    text: "Use Case — Kaiju Combo Attack"
    font: "Segoe UI"
    font_size: 22
    font_color: "#FFFFFF"
    font_bold: true
    auto_size: "shrink"

  - type: textbox
    left: 0.6
    top: 2.2
    width: 5.8
    height: 0.4
    text: "Primary User"
    font: "Segoe UI"
    font_size: 12
    font_color: "#4DA3FF"
    font_bold: true

  - type: textbox
    left: 0.6
    top: 2.7
    width: 5.8
    height: 0.7
    text: "Kaiju players — 2 to 4 in the same room, coordinating verbally."
    font: "Segoe UI"
    font_size: 10
    font_color: "#D7DDEA"
    auto_size: "shrink"

  - type: textbox
    left: 6.6
    top: 2.2
    width: 5.8
    height: 0.4
    text: "Secondary User"
    font: "Segoe UI"
    font_size: 12
    font_color: "#4DA3FF"
    font_bold: true

  - type: textbox
    left: 6.6
    top: 2.7
    width: 5.8
    height: 0.7
    text: "Spectators — eliminated players and observers who witness the combo result on screen and react in the room. Commander — receives the amplified threat event and must respond."
    font: "Segoe UI"
    font_size: 10
    font_color: "#D7DDEA"
    auto_size: "shrink"

  - type: textbox
    left: 0.6
    top: 3.5
    width: 12.0
    height: 0.4
    text: "Preconditions"
    font: "Segoe UI"
    font_size: 12
    font_color: "#4DA3FF"
    font_bold: true

  - type: textbox
    left: 0.6
    top: 4.0
    width: 12.0
    height: 0.6
    text: "- At least two kaiju players are active (not in spectator mode)\n- At least one kaiju has an ability with combo potential available (not on cooldown)\n- Players are in physical proximity and can communicate verbally"
    font: "Segoe UI"
    font_size: 10
    font_color: "#D7DDEA"
    auto_size: "shrink"

  - type: textbox
    left: 0.6
    top: 4.65
    width: 12.0
    height: 0.4
    text: "Steps"
    font: "Segoe UI"
    font_size: 12
    font_color: "#4DA3FF"
    font_bold: true

  - type: textbox
    left: 0.6
    top: 5.1
    width: 12.0
    height: 0.9
    text: "1. Kaiju Player A activates a buff/setup ability (e.g. Roar — buffs nearby kaiju attack)\n2. Player A calls out verbally: \"I'm buffed — everyone attack!\"\n3. Kaiju Players B (and C) trigger their attacks within the combo window\n4. Server detects combo condition (simultaneous or sequenced inputs within threshold)\n5. Amplified damage event fires on city base or target\n6. Kaiju screens show a distinct visual feedback for the combo landing (flash, shockwave, screen shake)\n7. Commander's `SignalFeed` receives a notable event entry\n8. Room reacts to the spectacle"
    font: "Segoe UI"
    font_size: 10
    font_color: "#D7DDEA"
    auto_size: "shrink"

  - type: textbox
    left: 0.6
    top: 6.05
    width: 12.0
    height: 0.4
    text: "Data Requirements"
    font: "Segoe UI"
    font_size: 12
    font_color: "#4DA3FF"
    font_bold: true

  - type: textbox
    left: 0.6
    top: 6.45
    width: 12.0
    height: 0.35
    text: "- Per-kaiju ability state (active, cooldown, type)\n- Combo detection window (time threshold for sequenced inputs)\n- Amplification multiplier per combo type\n- Combo event broadcast to all clients for visual feedback"
    font: "Segoe UI"
    font_size: 10
    font_color: "#D7DDEA"
    auto_size: "shrink"

  - type: textbox
    left: 0.6
    top: 6.9
    width: 8.6
    height: 0.25
