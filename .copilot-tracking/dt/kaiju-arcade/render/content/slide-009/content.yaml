  - type: textbox
    left: 0.6
    top: 2.7
    width: 12.0
    height: 0.8
    text: "Two or more kaiju players coordinate their attacks in real time — verbally, in the room — to trigger a combo that amplifies damage beyond what any single kaiju could deal alone."
    font: "Segoe UI"
    font_size: 10
    font_color: "#D7DDEA"
    auto_size: "shrink"

  - type: textbox
    left: 0.6
    top: 3.6
    width: 12.0
    height: 0.4
    text: "Overview"
    font: "Segoe UI"
    font_size: 12
    font_color: "#4DA3FF"
    font_bold: true

  - type: textbox
    left: 0.6
    top: 4.1
    width: 12.0
    height: 0.8
    text: "During a match, kaiju players in the same physical space recognize an opportunity to combine their abilities. One player may have a buff/debuff ability active (e.g. Roar, Submerge), while another is positioned to strike the city base or a Commander asset. Without any in-game tutorial, the combo emerges from verbal negotiation: \"I'm using Roar — everyone hit it now.\" The game detects the sequenced or simultaneous inputs and applies an amplified damage event."
    font: "Segoe UI"
    font_size: 10
    font_color: "#D7DDEA"
    auto_size: "shrink"

  - type: textbox
    left: 0.6
    top: 5.0
    width: 12.0
    height: 0.4
    text: "Business Value"
    font: "Segoe UI"
    font_size: 12
    font_color: "#4DA3FF"
    font_bold: true

  - type: textbox
    left: 0.6
    top: 5.5
    width: 12.0
    height: 0.9
    text: "Combo mechanics transform kaiju from independent attackers into a coordinated team without requiring complex UI or pre-game tutorials. They make the physical co-location of players a mechanical advantage — a feature that online play cannot replicate. Combos create the game's most memorable moments: the room erupts when one lands."
    font: "Segoe UI"
    font_size: 10
    font_color: "#D7DDEA"
    auto_size: "shrink"

