  - type: textbox
    left: 0.6
    top: 4.2
    width: 12.0
    height: 1.4
    text: "The kaiju breach the city base. The Commander's screen cuts to the score reveal: a large evacuation number, a letter grade or ranking, and a prompt to enter initials. Someone in the room groans. Someone else says \"I can do better than that — let me be Commander.\" The current Commander types three initials. The leaderboard flashes. The score is on the board.\n\nKaiju players are already arguing about which archetype to pick next round. The person who was spectating slides into the Commander seat. Another round code goes up. Thirty seconds later the next match starts.\n\nThe leaderboard is persistent — it lives in Azure Table Storage, it shows all-time best runs. Someone from last week is still in the top three. The new Commander has a target."
    font: "Segoe UI"
    font_size: 10
    font_color: "#D7DDEA"
    auto_size: "shrink"

