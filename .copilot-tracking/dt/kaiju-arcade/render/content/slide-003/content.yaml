    text: "The match ends — the city falls. The Commander's evacuation count is revealed, the score screen appears, and the room transitions into the social ritual of initials entry, leaderboard checking, and seat rotation for the next round."
    font: "Segoe UI"
    font_size: 10
    font_color: "#D7DDEA"
    auto_size: "shrink"

  - type: textbox
