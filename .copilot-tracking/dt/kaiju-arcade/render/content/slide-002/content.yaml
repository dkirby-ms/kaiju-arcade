    text: "The absence of short-form, co-located asymmetric multiplayer games is producing an unmet need for social gaming groups who want a high-energy, consequence-free simulation of coordination under pressure for players who enjoy both solo optimization (Commander) and emergent group chaos (Kaiju). How might we build a 90-second BYOD arcade experience — where the room's verbal energy is a core mechanic, kaiju always win but the Commander scores by saving lives, and every role is legible without a tutorial — so that we can provide a replayable, score-chasing social session where defeat feels like achievement and the leaderboard keeps people coming back?"
    font: "Segoe UI"
    font_size: 16
    font_color: "#D7DDEA"
    auto_size: "shrink"
    auto_size: "shrink"

