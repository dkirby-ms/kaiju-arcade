    text: "Use Case — Kaiju Combo Attack"
    font: "Segoe UI"
    font_size: 22
    font_color: "#FFFFFF"
    font_bold: true
    auto_size: "shrink"

  - type: textbox
    left: 0.6
    top: 2.2
    width: 5.8
    height: 0.4
    text: "Equipment Requirements"
    font: "Segoe UI"
    font_size: 12
    font_color: "#4DA3FF"
    font_bold: true

  - type: textbox
    left: 6.6
    top: 2.2
    width: 5.8
    height: 0.4
    text: "Operating Environment"
    font: "Segoe UI"
    font_size: 12
    font_color: "#4DA3FF"
    font_bold: true

  - type: textbox
    left: 0.6
    top: 2.7
    width: 5.8
    height: 0.6
    text: "- Each kaiju player: phone or tablet running the kaiju client\n- Physical co-location: players must be able to hear each other without in-game voice chat"
    font: "Segoe UI"
    font_size: 10
    font_color: "#D7DDEA"
    auto_size: "shrink"

  - type: textbox
    left: 6.6
    top: 2.7
    width: 5.8
    height: 0.6
    text: "Same room as Commander and other players. Noise is expected and desirable. No internet voice channel required — verbal coordination is the mechanic."
    font: "Segoe UI"
    font_size: 10
    font_color: "#D7DDEA"
    auto_size: "shrink"

  - type: textbox
    left: 0.6
    top: 3.5
    width: 12.0
    height: 0.4
    text: "Success Criteria"
    font: "Segoe UI"
    font_size: 12
    font_color: "#4DA3FF"
    font_bold: true

  - type: textbox
    left: 0.6
    top: 4.0
    width: 12.0
    height: 1.0
    text: "- A first-time player discovers a combo exists within their first match without reading instructions\n- The combo landing produces a visible, audible, and social moment in the room\n- Commander acknowledges the threat visually — the combo registers as a meaningful escalation"
    font: "Segoe UI"
    font_size: 10
    font_color: "#D7DDEA"
    auto_size: "shrink"

  - type: textbox
    left: 0.6
    top: 5.1
    width: 12.0
    height: 0.4
    text: "Pain Points"
    font: "Segoe UI"
    font_size: 12
    font_color: "#4DA3FF"
    font_bold: true

  - type: textbox
    left: 0.6
    top: 5.6
    width: 12.0
    height: 1.0
    text: "- If combo windows are too short, verbal coordination can't keep up in real time\n- If kaiju ability icons are unclear, players won't know when a combo opportunity exists\n- If the combo feedback is too subtle, the room won't react and the moment is lost"
    font: "Segoe UI"
    font_size: 10
    font_color: "#D7DDEA"
    auto_size: "shrink"

