  - type: textbox
    left: 0.6
    top: 2.7
    width: 12.0
    height: 0.9
    text: "A group of 3–5 people at a social event — a bar, a house party, a work event — discover or are introduced to Kaiju vs. Command. One person pulls up the Commander dashboard on a laptop; others join as kaiju on their phones via a room code. Rounds are 90 seconds. Players rotate seats between rounds and chase the high score leaderboard."
    font: "Segoe UI"
    font_size: 10
    font_color: "#D7DDEA"
    auto_size: "shrink"

  - type: textbox
    left: 0.6
    top: 3.7
    width: 12.0
    height: 0.4
    text: "Scenario Narrative"
    font: "Segoe UI"
    font_size: 12
    font_color: "#4DA3FF"
    font_bold: true

  - type: textbox
    left: 0.6
    top: 4.2
    width: 12.0
    height: 1.4
    text: "A group is hanging out. Someone opens the game on a laptop and puts it where others can see. Three people grab their phones and scan/type a room code to join as kaiju. The room fills with noise almost immediately — the Commander is barking asset dispatches at the screen, the kaiju players are shouting at each other to time their push. The match ends in under two minutes. The city falls. The Commander enters their initials on a CRT-styled score screen. Someone else slides into the Commander seat. The kaiju players are already picking new leviathans. The next round starts.\n\nThe game works because it needs no instruction. The Commander's dashboard reads like a crisis — threats on the map, assets to deploy, rockets to launch. The kaiju feel the city getting closer with every tap. The room becomes the meta-game: yelling, laughing, second-guessing the Commander's choices."
    font: "Segoe UI"
    font_size: 10
    font_color: "#D7DDEA"
    auto_size: "shrink"

  - type: textbox
    left: 0.6
    top: 5.7
    width: 12.0
    height: 0.4
    text: "How Might We"
    font: "Segoe UI"
    font_size: 12
    font_color: "#4DA3FF"
    font_bold: true

  - type: textbox
    left: 0.6
    top: 6.2
    width: 12.0
    height: 0.5
    text: "How might we design a game that communicates its core loop — hold the city as long as possible, save as many people as you can — without a tutorial, so that a group of strangers can be mid-match within 60 seconds of someone opening a laptop?"
    font: "Segoe UI"
    font_size: 10
    font_color: "#D7DDEA"
    auto_size: "shrink"

