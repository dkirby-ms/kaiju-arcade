    width: 12.0
    height: 1.5
    text: "Build a short-form, BYOD local multiplayer arcade game where one player commands a city's last defense while one to four others pilot unstoppable kaiju — a consequence-free simulation of asymmetric incident command where the only question is how many you can save before the city falls."
    font: "Segoe UI"
    font_size: 10
    font_color: "#D7DDEA"
    auto_size: "shrink"

  - type: textbox
    left: 0.6
    top: 4.3
    width: 12.0
    height: 0.4
    text: "Why This Matters"
    font: "Segoe UI"
    font_size: 12
    font_color: "#4DA3FF"
    font_bold: true

  - type: textbox
    left: 0.6
    top: 4.8
    width: 12.0
    height: 1.8
    text: "Asymmetric multiplayer games are rare in the local co-located space. Most require dedicated hardware or assume online play. Kaiju vs. Command targets the Jackbox-style social session: everyone in the same room, own devices, rounds short enough to swap seats and chase the high score.\n\nThe \"managed retreat\" framing — kaiju always win; the Commander scores by evacuating humans — creates a replayable loop with no binary win/lose frustration. Players want to beat their own evacuation record and the leaderboard, not just survive. The arcade aesthetic (1993 quarter-muncher, CRT phosphor, INSERT COIN flash) anchors the tone: this is a game you play loudly with other people, not a polished esports title."
    font: "Segoe UI"
    font_size: 10
    font_color: "#D7DDEA"
    auto_size: "shrink"

