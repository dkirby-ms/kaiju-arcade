    height: 0.7
    text: "The Incident Commander — solo player, no respawns, full match duration."
    font: "Segoe UI"
    font_size: 10
    font_color: "#D7DDEA"
    auto_size: "shrink"

  - type: textbox
    left: 6.6
    top: 2.2
    width: 5.8
    height: 0.4
    text: "Secondary User"
    font: "Segoe UI"
    font_size: 12
    font_color: "#4DA3FF"
    font_bold: true

  - type: textbox
    left: 6.6
    top: 2.7
    width: 5.8
    height: 0.7
    text: "Kaiju players — their aggression directly drives the urgency of the Commander's decisions. Spectators — watching the Commander's triage choices is part of the social experience."
    font: "Segoe UI"
    font_size: 10
    font_color: "#D7DDEA"
    auto_size: "shrink"

  - type: textbox
    left: 0.6
    top: 3.5
    width: 12.0
    height: 0.4
    text: "Preconditions"
    font: "Segoe UI"
    font_size: 12
    font_color: "#4DA3FF"
    font_bold: true

  - type: textbox
    left: 0.6
    top: 4.0
    width: 12.0
    height: 0.6
    text: "- Match has started; at least one kaiju is active and advancing\n- Commander dashboard is live with asset economy and rocket launch UI visible\n- City base HP is above zero"
    font: "Segoe UI"
    font_size: 10
    font_color: "#D7DDEA"
    auto_size: "shrink"

  - type: textbox
    left: 0.6
    top: 4.65
    width: 12.0
    height: 0.4
    text: "Steps"
    font: "Segoe UI"
    font_size: 12
    font_color: "#4DA3FF"
    font_bold: true

  - type: textbox
    left: 0.6
    top: 5.1
    width: 12.0
    height: 0.9
    text: "1. Commander scans `CommandMap` for active leviathan positions and base threat level\n2. Commander assesses asset availability in `DispatchPanel`\n3. Commander evaluates rocket launch readiness (cooldown / launch window)\n4. Commander decides: dispatch defensive asset targeting a specific leviathan, OR trigger a rocket launch\n5. If dispatching: selects leviathan, selects asset; `CommandRecord` queues with 1–5s resolution delay\n6. If launching: triggers launch; spool-up window begins; `SignalFeed` confirms launch queued\n7. `SignalFeed` reports resolution outcome (success / partial / failed / unverified) for dispatches\n8. Evacuation count increments on successful launch; Commander sees updated score\n9. Loop repeats until city base HP reaches 0 or 90 seconds elapses"
    font: "Segoe UI"
    font_size: 10
    font_color: "#D7DDEA"
    auto_size: "shrink"

  - type: textbox
    left: 0.6
    top: 6.05
    width: 12.0
    height: 0.4
    text: "Data Requirements"
    font: "Segoe UI"
    font_size: 12
    font_color: "#4DA3FF"
    font_bold: true

  - type: textbox
    left: 0.6
    top: 6.45
    width: 12.0
    height: 0.35
    text: "- Real-time leviathan positions, HP, and status\n- Asset availability and cooldown state\n- Rocket launch readiness and cooldown\n- City base HP\n- Current evacuation count / score\n- `SignalFeed` event stream for resolution feedback"
    font: "Segoe UI"
    font_size: 10
    font_color: "#D7DDEA"
    auto_size: "shrink"

